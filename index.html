  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

", level: \"L1\", laps: [7,7,6,7,7,11,8,10,10,8,7] },\n  { name: \"Sabrina\",   tier: \"Building\",      level: \"L1\", laps: [7,7,8,7,7,10,12,10,10,8,8] },\n  { name: \"Sophie\",    tier: \"Needs Support\", level: \"LL\", laps: [9,8,8,9,8,10,11,10,10,11,9] },\n  { name: \"Annalise\",  tier: \"Needs Support\", level: \"L1\", laps: [4,null,6,4,null,10,9,3,10,2,null] },\n  { name: \"Arthur\",    tier: \"Building\",      level: \"L1\", laps: [4,7,null,4,null,10,12,10,10,6,10] },\n  { name: \"Hana\",      tier: \"Building\",      level: \"L1\", laps: [9,10,8,9,10,10,null,10,10,12,8] },\n  { name: \"Caleb\",     tier: \"Needs Support\", level: \"LL\", laps: [4,8,7,4,8,10,12,10,10,5,4] },\n  { name: \"Audrey\",    tier: \"Race-Ready\",    level: \"L2\", laps: [12,null,14,12,null,null,12,10,10,12,null] },\n  { name: \"Nathaniel\", tier: \"Race-Ready\",    level: \"L2\", laps: [10,13,12,10,13,13,14,10,10,12,15] },\n  { name: \"Reverie\",   tier: \"Building\",      level: \"L1\", laps: [9,10,9,9,10,11,12,10,10,null,13] },\n  { name: \"Graham\",    tier: \"Building\",      level: \"L1\", laps: [9,6,8,9,6,10,12,10,10,8,9] },\n  { name: \"Serena\",    tier: \"Building\",      level: \"L2\", laps: [null,null,null,null,null,null,null,null,10,10,11] },\n];\n\nconst LEVEL_T2P = { L2: 34, L1: 35, LL: 38 };\nconst LAP_MI = 0.2;\nconst fmtMi = (v) => `${(Math.round(v * 10) / 10).toFixed(1)} mi`;\n\n// Auto-promote any student who has hit 2.6 mi (13 laps) to Race-Ready.\nstudents.forEach(s => {\n  const filled = s.laps.filter(v => v !== null);\n  const maxLap = filled.length ? Math.max(...filled) : 0;\n  if (maxLap >= 13) s.tier = \"Race-Ready\";\n  s._autoTier = s.tier;\n});\n\n// Manual tier overrides set by the coach (persisted in browser).\nconst OVERRIDES_KEY = \"aw5k-tier-overrides-v1\";\nlet tierOverrides = {};\ntry { tierOverrides = JSON.parse(localStorage.getItem(OVERRIDES_KEY)) || {}; } catch (e) { tierOverrides = {}; }\nstudents.forEach(s => {\n  if (tierOverrides[s.name]) s.tier = tierOverrides[s.name];\n});\nfunction saveTierOverrides() {\n  try { localStorage.setItem(OVERRIDES_KEY, JSON.stringify(tierOverrides)); } catch (e) {}\n}\n\n// Coach notes (also persisted in browser, loaded early so cards can render previews).\nconst NOTES_KEY = \"aw5k-coach-notes-v1\";\nlet notes = {};\ntry { notes = JSON.parse(localStorage.getItem(NOTES_KEY)) || {}; } catch (e) { notes = {}; }\nfunction saveNotes() {\n  try { localStorage.setItem(NOTES_KEY, JSON.stringify(notes)); } catch (e) {}\n}\nfunction renderCardNote(name) {\n  const slot = document.querySelector(`[data-note-slot=\"${CSS.escape(name)}\"]`);\n  if (!slot) return;\n  const card = slot.closest(\".scard\");\n  const note = (notes[name] || \"\").trim();\n  if (note) {\n    slot.innerHTML = `<div class=\"note-preview\"><\u002Fdiv>`;\n    slot.firstChild.textContent = note;\n    if (card) card.classList.add(\"has-note\");\n  } else {\n    slot.innerHTML = `<div class=\"note-add\">+ Add coach note<\u002Fdiv>`;\n    if (card) card.classList.remove(\"has-note\");\n  }\n}\n\nconst sessions = [\n  { label: \"S1\",  date: \"Mar 24\" },\n  { label: \"S2\",  date: \"Mar 31\" },\n  { label: \"S3\",  date: \"Apr 7\"  },\n  { label: \"S4\",  date: \"Apr 9\"  },\n  { label: \"S5\",  date: \"Apr 13\" },\n  { label: \"S6\",  date: \"Apr 15\" },\n  { label: \"S7\",  date: \"Apr 27\" },\n  { label: \"S8\",  date: \"Apr 29\" },\n  { label: \"S9\",  date: \"May 5\",  group: true, event: \"GGB Bridge Run\" },\n  { label: \"S10\", date: \"May 11\" },\n  { label: \"S11\", date: \"May 13\" },\n];\n\n/* ====================== SAVED-DATA OVERRIDE ====================== */\n/* If the coach has edited session data via the Editor, load it before\n   anything else uses `sessions` / `students.laps`. */\nconst SESSION_STORAGE_KEY = \"all-around-world-5k:session-data:v2\";\n(function loadSavedSessionData() {\n  try {\n    const raw = localStorage.getItem(SESSION_STORAGE_KEY);\n    if (!raw) return;\n    const data = JSON.parse(raw);\n    if (Array.isArray(data.sessions) && data.sessions.length) {\n      sessions.length = 0;\n      data.sessions.forEach(s => sessions.push(s));\n    }\n    if (data.laps && typeof data.laps === \"object\") {\n      const n = sessions.length;\n      students.forEach(stu => {\n        const saved = data.laps[stu.name];\n        if (Array.isArray(saved)) {\n          // Pad or trim to match current session count.\n          const arr = saved.slice(0, n);\n          while (arr.length < n) arr.push(null);\n          stu.laps = arr;\n        } else {\n          // Student not in saved data (e.g. roster grew). Pad existing laps.\n          while (stu.laps.length < n) stu.laps.push(null);\n          if (stu.laps.length > n) stu.laps = stu.laps.slice(0, n);\n        }\n      });\n    }\n  } catch (e) {\n    console.warn(\"Could not load saved session data:\", e);\n  }\n})();\n\nconst TIER_COLOR = {\n  \"Race-Ready\":    \"#16A34A\",\n  \"Building\":      \"#D97706\",\n  \"Needs Support\": \"#DC2626\",\n  \"Check In\":      \"#9CA3AF\",\n  \"New\":           \"#9CA3AF\",\n};\n\n/* ====================== HERO STATS ====================== */\nfunction daysToRace() {\n  const race = new Date(\"2026-06-06T00:00:00\");\n  const today = new Date();\n  today.setHours(0,0,0,0);\n  const ms = race - today;\n  return Math.max(0, Math.round(ms / 86400000));\n}\nconst totalLaps = students.reduce(\n  (sum, s) => sum + s.laps.reduce((a,b)=> a + (b||0), 0), 0\n);\ndocument.getElementById(\"daysToRace\").textContent = daysToRace();\ndocument.getElementById(\"totalMiles\").textContent = (totalLaps * 0.2).toFixed(1) + \" mi\";\n\n/* ====================== CHART ====================== */\nconst xLabels = sessions.map(s => `${s.label} ${s.date}`);\n\n// Compute the group-run band edges dynamically based on sessions[].group flags.\nconst _groupIdxs = sessions.map((s, i) => (s.group ? i : -1)).filter(i => i >= 0);\nconst hasGroupBand = _groupIdxs.length > 0;\nconst groupBandXMin = hasGroupBand ? _groupIdxs[0] - 0.5 : 0;\nconst groupBandXMax = hasGroupBand ? _groupIdxs[_groupIdxs.length - 1] + 0.5 : 0;\n\nfunction tierForLine(s) {\n  // \"New/Insufficient data\" gray line: students with only S14 data, etc.\n  const filled = s.laps.filter(v => v !== null).length;\n  if (filled <= 1) return \"New\";\n  return s.tier;\n}\n\nconst datasets = students.map((s, i) => {\n  const t = tierForLine(s);\n  const color = TIER_COLOR[t] || \"#9CA3AF\";\n  return {\n    label: s.name,\n    data: s.laps.map(v => v === null ? null : +(v * LAP_MI).toFixed(2)),\n    borderColor: color,\n    backgroundColor: color,\n    borderWidth: 2,\n    pointRadius: 0,\n    pointHoverRadius: 4,\n    pointHoverBorderWidth: 2,\n    pointHoverBackgroundColor: \"#fff\",\n    pointHoverBorderColor: color,\n    tension: 0.25,\n    spanGaps: true,\n    _baseColor: color,\n    _tier: s.tier,\n    _idx: i,\n  };\n});\n\nfunction rgba(hex, a) {\n  const h = hex.replace(\"#\",\"\");\n  const r = parseInt(h.substring(0,2),16);\n  const g = parseInt(h.substring(2,4),16);\n  const b = parseInt(h.substring(4,6),16);\n  return `rgba(${r},${g},${b},${a})`;\n}\n\n// Apply default semi-transparency\ndatasets.forEach(d => { d.borderColor = rgba(d._baseColor, 0.5); });\n\nconst ctx = document.getElementById(\"chart\").getContext(\"2d\");\nconst chart = new Chart(ctx, {\n  type: \"line\",\n  data: { labels: xLabels, datasets },\n  options: {\n    responsive: true,\n    maintainAspectRatio: false,\n    interaction: { mode: \"nearest\", intersect: false, axis: \"x\" },\n    layout: { padding: { top: 24, right: 12, bottom: 4, left: 0 } },\n    plugins: {\n      legend: { display: false },\n      tooltip: {\n        backgroundColor: \"#FFFFFF\",\n        titleColor: \"#1A1A1A\",\n        bodyColor: \"#1A1A1A\",\n        borderColor: \"#E5E7EB\",\n        borderWidth: 1,\n        padding: 10,\n        cornerRadius: 6,\n        titleFont: { family: getComputedStyle(document.body).fontFamily, weight: \"600\", size: 12 },\n        bodyFont:  { family: getComputedStyle(document.body).fontFamily, size: 12 },\n        displayColors: true,\n        boxWidth: 8,\n        boxHeight: 8,\n        usePointStyle: true,\n        filter: (item) => item.parsed.y !== null && item.parsed.y !== undefined,\n        callbacks: {\n          title: (items) => items.length ? xLabels[items[0].dataIndex] : \"\",\n          label: (item) => ` ${item.dataset.label}: ${item.parsed.y.toFixed(1)} mi`,\n        },\n      },\n      annotation: {\n        annotations: {\n          raceLine: {\n            type: \"line\",\n            yMin: 3.1, yMax: 3.1,\n            borderColor: \"#0A0E6B\",\n            borderWidth: 1.5,\n            borderDash: [5, 4],\n            label: {\n              display: true,\n              content: \"Race Distance (3.1 mi)\",\n              position: \"end\",\n              backgroundColor: \"#0A0E6B\",\n              color: \"#fff\",\n              font: { size: 10, weight: \"600\", family: getComputedStyle(document.body).fontFamily },\n              padding: { top: 4, bottom: 4, left: 8, right: 8 },\n              borderRadius: 4,\n              yAdjust: -2,\n            },\n          },\n          groupBand: {\n            type: \"box\",\n            xMin: groupBandXMin,\n            xMax: groupBandXMax,\n            display: hasGroupBand,\n            backgroundColor: \"rgba(10, 14, 107, 0.04)\",\n            borderColor: \"rgba(10, 14, 107, 0.18)\",\n            borderWidth: 0,\n            borderDash: [4, 4],\n            drawTime: \"beforeDatasetsDraw\",\n            label: {\n              display: true,\n              content: \"SF Week + GGB Bridge Run · May 5–7\",\n              position: { x: \"center\", y: \"start\" },\n              backgroundColor: \"#FFFFFF\",\n              color: \"#0A0E6B\",\n              borderColor: \"#0A0E6B\",\n              borderWidth: 1,\n              font: { size: 10, weight: \"600\", family: getComputedStyle(document.body).fontFamily },\n              padding: { top: 4, bottom: 4, left: 8, right: 8 },\n              borderRadius: 4,\n              yAdjust: -6,\n            },\n          },\n          // dashed left/right edges of the band\n          bandLeft: {\n            type: \"line\",\n            xMin: groupBandXMin, xMax: groupBandXMin,\n            display: hasGroupBand,\n            borderColor: \"rgba(10,14,107,0.25)\",\n            borderWidth: 1,\n            borderDash: [4, 4],\n          },\n          bandRight: {\n            type: \"line\",\n            xMin: groupBandXMax, xMax: groupBandXMax,\n            display: hasGroupBand,\n            borderColor: \"rgba(10,14,107,0.25)\",\n            borderWidth: 1,\n            borderDash: [4, 4],\n          },\n        }\n      }\n    },\n    scales: {\n      x: {\n        grid: { display: false, drawBorder: false },\n        border: { color: \"#E5E7EB\" },\n        ticks: {\n          color: \"#6B7280\",\n          font: { size: 11, family: getComputedStyle(document.body).fontFamily },\n          maxRotation: 0,\n          minRotation: 0,\n          autoSkip: false,\n          callback: function(value, idx) {\n            const s = sessions[idx];\n            return [s.label, s.date];\n          },\n        },\n      },\n      y: {\n        min: 0,\n        max: 3.2,\n        grid: { color: \"#F3F4F6\", drawBorder: false },\n        border: { display: false },\n        ticks: {\n          stepSize: 0.4,\n          color: \"#6B7280\",\n          font: { size: 11, family: getComputedStyle(document.body).fontFamily },\n          padding: 6,\n          callback: (v) => v.toFixed(1),\n        },\n        title: {\n          display: true,\n          text: \"Miles\",\n          color: \"#6B7280\",\n          font: { size: 11, weight: \"500\", family: getComputedStyle(document.body).fontFamily },\n        },\n      },\n    },\n  },\n});\n\n/* ====================== STUDENT CARDS ====================== */\nconst TIER_ORDER = { \"Race-Ready\": 0, \"Building\": 1, \"Needs Support\": 2, \"Check In\": 3 };\n\nfunction latestStats(s) {\n  const laps = s.laps;\n  const lastIdx = laps.length - 1;\n  const latest = laps[lastIdx]; // may be null\n  // best = max of non-null\n  const filled = laps.filter(v => v !== null);\n  const best = filled.length ? Math.max(...filled) : null;\n  // previous: most recent non-null before lastIdx\n  let prev = null;\n  for (let i = lastIdx - 1; i >= 0; i--) {\n    if (laps[i] !== null) { prev = laps[i]; break; }\n  }\n  return { latest, best, prev };\n}\n\nconst grid = document.getElementById(\"grid\");\ndocument.getElementById(\"studentCount\").textContent = `${students.length} runners`;\n\nconst tierClass = {\n  \"Race-Ready\":    \"race-ready\",\n  \"Building\":      \"building\",\n  \"Needs Support\": \"needs\",\n  \"Check In\":      \"checkin\",\n};\n\nfunction sortedStudents() {\n  return [...students].sort((a, b) => {\n    const ta = TIER_ORDER[a.tier] ?? 99;\n    const tb = TIER_ORDER[b.tier] ?? 99;\n    if (ta !== tb) return ta - tb;\n    const ba = (latestStats(a).best ?? -1);\n    const bb = (latestStats(b).best ?? -1);\n    return bb - ba;\n  });\n}\n\nfunction createCard(s) {\n  const { latest, best, prev } = latestStats(s);\n  const card = document.createElement(\"div\");\n  card.className = \"scard\";\n  card.dataset.name = s.name;\n\n  let deltaHtml = \"\";\n  let latestText;\n  if (latest === null) {\n    latestText = `<span class=\"val\" style=\"color:var(--red)\">DNS<\u002Fspan>`;\n  } else if (latest === 0) {\n    latestText = `<span class=\"val\" style=\"color:var(--red)\">DNS (0)<\u002Fspan>`;\n  } else {\n    latestText = `<span class=\"val\">${fmtMi(latest * LAP_MI)}<\u002Fspan>`;\n    if (prev === null) {\n      deltaHtml = `<span class=\"delta same\">—<\u002Fspan>`;\n    } else {\n      const d = (latest - prev) * LAP_MI;\n      const dAbs = Math.abs(d).toFixed(1);\n      if (d > 0.0001)       deltaHtml = `<span class=\"delta up\">↑ +${dAbs} mi<\u002Fspan>`;\n      else if (d < -0.0001) deltaHtml = `<span class=\"delta down\">↓ -${dAbs} mi<\u002Fspan>`;\n      else                  deltaHtml = `<span class=\"delta same\">→ same<\u002Fspan>`;\n    }\n  }\n\n  const bestText = (best === null) ? \"—\" : fmtMi(best * LAP_MI);\n  const lvl = s.level || \"—\";\n  const t2p = LEVEL_T2P[s.level];\n  const metaText = t2p ? `${lvl} · T2P goal: ${t2p} min` : lvl;\n\n  card.innerHTML = `\n    <span class=\"pill ${tierClass[s.tier]}\">${s.tier}<\u002Fspan>\n    <div class=\"name-row\">\n      <span class=\"name\">${s.name}<\u002Fspan>\n      <svg class=\"name-icon\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 20h9\"><\u002Fpath><path d=\"M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z\"><\u002Fpath><\u002Fsvg>\n    <\u002Fdiv>\n    <div class=\"meta\">${metaText}<\u002Fdiv>\n    <div class=\"row\">\n      <span class=\"label\">Latest<\u002Fspan>\n      <span>${latestText}${deltaHtml ? \" \" + deltaHtml : \"\"}<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"row\">\n      <span class=\"label\">Best<\u002Fspan>\n      <span class=\"val\">${bestText}<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"note-slot\" data-note-slot=\"${s.name}\"><\u002Fdiv>\n  `;\n\n  card.addEventListener(\"mouseenter\", () => highlight(s.name, true));\n  card.addEventListener(\"mouseleave\", () => highlight(s.name, false));\n  card.addEventListener(\"click\", () => openNoteEditor(s.name));\n  return card;\n}\n\nfunction renderCards() {\n  grid.innerHTML = \"\";\n  sortedStudents().forEach(s => grid.appendChild(createCard(s)));\n  // Restore note previews (createCard creates empty .note-slot elements)\n  students.forEach(s => renderCardNote(s.name));\n}\n\nrenderCards();\n\n/* ====================== HIGHLIGHT SYNC ====================== */\nfunction highlight(name, on) {\n  datasets.forEach(d => {\n    if (d.hidden) return;\n    if (on) {\n      if (d.label === name) {\n        d.borderColor = d._baseColor;\n        d.borderWidth = 3;\n        d.order = -1;\n      } else {\n        d.borderColor = rgba(d._baseColor, 0.08);\n        d.borderWidth = 1.5;\n        d.order = 1;\n      }\n    } else {\n      d.borderColor = rgba(d._baseColor, 0.5);\n      d.borderWidth = 2;\n      d.order = 0;\n    }\n  });\n  chart.update(\"none\");\n\n  // mirror card .active class\n  document.querySelectorAll(\".scard\").forEach(el => {\n    el.classList.toggle(\"active\", on && el.dataset.name === name);\n  });\n}\n\n/* ====================== FILTER SIDEBAR ====================== */\nconst visible = new Set(students.map(s => s.name));\nconst filterList = document.getElementById(\"filterList\");\n\nconst alphaStudents = [...students].sort((a, b) => a.name.localeCompare(b.name));\nalphaStudents.forEach(s => {\n  const ds = datasets.find(d => d.label === s.name);\n  const color = ds ? ds._baseColor : \"#9CA3AF\";\n  const row = document.createElement(\"div\");\n  row.className = \"fitem on\";\n  row.dataset.name = s.name;\n  row.innerHTML = `\n    <span class=\"fcheck\"><\u002Fspan>\n    <span class=\"fdot\" style=\"background:${color}\"><\u002Fspan>\n    <span class=\"fname\">${s.name}<\u002Fspan>\n  `;\n  row.addEventListener(\"click\", () => toggleStudent(s.name));\n  row.addEventListener(\"mouseenter\", () => highlight(s.name, true));\n  row.addEventListener(\"mouseleave\", () => highlight(s.name, false));\n  filterList.appendChild(row);\n});\n\nfunction applyVisibility() {\n  datasets.forEach((d, i) => {\n    const show = visible.has(d.label);\n    d.hidden = !show;\n    chart.setDatasetVisibility(i, show);\n  });\n  chart.update(\"none\");\n  document.querySelectorAll(\".fitem\").forEach(el => {\n    el.classList.toggle(\"on\", visible.has(el.dataset.name));\n  });\n}\n\nfunction toggleStudent(name) {\n  if (visible.has(name)) visible.delete(name);\n  else visible.add(name);\n  applyVisibility();\n}\n\ndocument.getElementById(\"fAll\").addEventListener(\"click\", () => {\n  students.forEach(s => visible.add(s.name));\n  applyVisibility();\n});\ndocument.getElementById(\"fNone\").addEventListener(\"click\", () => {\n  visible.clear();\n  applyVisibility();\n});\n\n/* ====================== COACH NOTES MODAL ====================== */\n// Modal elements\nconst modal       = document.getElementById(\"noteModal\");\nconst noteNameEl  = document.getElementById(\"noteName\");\nconst noteSubEl   = document.getElementById(\"noteSub\");\nconst noteStatsEl = document.getElementById(\"noteStats\");\nconst noteTextEl  = document.getElementById(\"noteText\");\nconst noteSavedEl = document.getElementById(\"noteSaved\");\nconst tierOptionsEl = document.getElementById(\"tierOptions\");\nconst tierResetEl   = document.getElementById(\"tierReset\");\nlet currentStudent = null;\n\nfunction setTier(name, newTier) {\n  const s = students.find(x => x.name === name);\n  if (!s) return;\n  if (newTier === null) {\n    delete tierOverrides[name];\n    s.tier = s._autoTier;\n  } else {\n    tierOverrides[name] = newTier;\n    s.tier = newTier;\n  }\n  saveTierOverrides();\n\n  // Recolor the chart line + filter dot to match new tier.\n  const ds = datasets.find(d => d.label === name);\n  if (ds) {\n    const filled = s.laps.filter(v => v !== null).length;\n    const tForLine = filled <= 1 ? \"New\" : s.tier;\n    const color = TIER_COLOR[tForLine] || \"#9CA3AF\";\n    ds._baseColor = color;\n    ds.backgroundColor = color;\n    ds.pointHoverBorderColor = color;\n    ds.borderColor = rgba(color, 0.5);\n  }\n  const fdot = document.querySelector(`.fitem[data-name=\"${CSS.escape(name)}\"] .fdot`);\n  if (fdot && ds) fdot.style.background = ds._baseColor;\n  chart.update(\"none\");\n\n  renderCards();\n  updateTierPicker(name);\n  // Update the open modal's subtitle if this is the current student.\n  if (currentStudent === name) {\n    const lvl = s.level || \"—\";\n    const t2p = LEVEL_T2P[s.level];\n    noteSubEl.textContent = `${s.tier} · ${lvl}${t2p ? ` · T2P goal: ${t2p} min` : \"\"}`;\n  }\n}\n\nfunction updateTierPicker(name) {\n  const s = students.find(x => x.name === name);\n  if (!s) return;\n  tierOptionsEl.querySelectorAll(\".tier-opt\").forEach(btn => {\n    btn.classList.toggle(\"on\", btn.dataset.tier === s.tier);\n  });\n  tierResetEl.hidden = !tierOverrides[name];\n}\n\ntierOptionsEl.querySelectorAll(\".tier-opt\").forEach(btn => {\n  btn.addEventListener(\"click\", (e) => {\n    e.stopPropagation();\n    if (!currentStudent) return;\n    setTier(currentStudent, btn.dataset.tier);\n  });\n});\ntierResetEl.addEventListener(\"click\", (e) => {\n  e.stopPropagation();\n  if (!currentStudent) return;\n  setTier(currentStudent, null);\n});\n\nfunction openNoteEditor(name) {\n  const s = students.find(x => x.name === name);\n  if (!s) return;\n  currentStudent = name;\n\n  const { latest, best } = latestStats(s);\n  const lvl = s.level || \"—\";\n  const t2p = LEVEL_T2P[s.level];\n\n  noteNameEl.textContent = s.name;\n  noteSubEl.textContent  = `${s.tier} · ${lvl}${t2p ? ` · T2P goal: ${t2p} min` : \"\"}`;\n\n  const latestMi = (latest === null) ? \"DNS\" : (latest === 0 ? \"DNS (0)\" : fmtMi(latest * LAP_MI));\n  const bestMi   = (best === null)   ? \"—\"   : fmtMi(best * LAP_MI);\n  noteStatsEl.innerHTML = `\n    <span>Latest: <b>${latestMi}<\u002Fb><\u002Fspan>\n    <span>Best: <b>${bestMi}<\u002Fb><\u002Fspan>\n    <span>Race target: <b>3.1 mi<\u002Fb><\u002Fspan>\n  `;\n\n  noteTextEl.value = notes[name] || \"\";\n  noteSavedEl.textContent = notes[name] ? \"Last saved on this device.\" : \"\";\n  updateTierPicker(name);\n  modal.hidden = false;\n  setTimeout(() => noteTextEl.focus(), 30);\n}\n\nfunction closeNoteEditor() {\n  modal.hidden = true;\n  currentStudent = null;\n}\n\ndocument.getElementById(\"noteClose\").addEventListener(\"click\", closeNoteEditor);\ndocument.getElementById(\"noteCancel\").addEventListener(\"click\", closeNoteEditor);\ndocument.getElementById(\"noteBackdrop\").addEventListener(\"click\", closeNoteEditor);\ndocument.addEventListener(\"keydown\", (e) => {\n  if (!modal.hidden && e.key === \"Escape\") closeNoteEditor();\n  if (!modal.hidden && (e.metaKey || e.ctrlKey) && e.key === \"Enter\") {\n    document.getElementById(\"noteSave\").click();\n  }\n});\n\ndocument.getElementById(\"noteSave\").addEventListener(\"click\", () => {\n  if (!currentStudent) return;\n  const value = noteTextEl.value.trim();\n  if (value) notes[currentStudent] = value;\n  else delete notes[currentStudent];\n  saveNotes();\n  renderCardNote(currentStudent);\n  closeNoteEditor();\n});\n\ndocument.getElementById(\"noteDelete\").addEventListener(\"click\", () => {\n  if (!currentStudent) return;\n  delete notes[currentStudent];\n  saveNotes();\n  renderCardNote(currentStudent);\n  closeNoteEditor();\n});\n\n/* ====================== RACE STRATEGY MODAL ====================== */\nconst strategyModal = document.getElementById(\"strategyModal\");\n\nfunction renderEffortMeters() {\n  const levelClass = (i) => {\n    if (i <= 3) return \"lv-easy\";\n    if (i <= 5) return \"lv-light\";\n    if (i <= 7) return \"lv-medium\";\n    return \"lv-hard\";\n  };\n  document.querySelectorAll(\".phase-meter\").forEach(meter => {\n    if (meter.dataset.rendered) return;\n    const fill = parseInt(meter.dataset.fill, 10) || 0;\n    const range = parseInt(meter.dataset.range, 10) || 0;\n    const top = Math.max(fill, range);\n    let html = \"\";\n    for (let i = 1; i <= 10; i++) {\n      const classes = [\"cell\"];\n      if (i <= fill) {\n        classes.push(\"on\", levelClass(i));\n      } else if (i <= top) {\n        classes.push(\"range\", levelClass(i));\n      }\n      html += `<span class=\"${classes.join(\" \")}\"><\u002Fspan>`;\n    }\n    meter.innerHTML = html;\n    meter.dataset.rendered = \"1\";\n  });\n}\n\nfunction openStrategy() {\n  strategyModal.hidden = false;\n  renderEffortMeters();\n}\nfunction closeStrategy() {\n  strategyModal.hidden = true;\n}\n\ndocument.getElementById(\"raceStrategyBtn\").addEventListener(\"click\", openStrategy);\ndocument.getElementById(\"strategyClose\").addEventListener(\"click\", closeStrategy);\ndocument.getElementById(\"strategyBackdrop\").addEventListener(\"click\", closeStrategy);\ndocument.addEventListener(\"keydown\", (e) => {\n  if (!strategyModal.hidden && e.key === \"Escape\") closeStrategy();\n});\n\n/* ====================== DYNAMIC HERO + CHART META ====================== */\n(function syncMeta() {\n  const heroCount = document.getElementById(\"heroSessionsCount\");\n  if (heroCount) heroCount.textContent = String(sessions.length);\n  const sub = document.getElementById(\"chartSubtitle\");\n  if (sub && sessions.length) {\n    const first = sessions[0];\n    const last  = sessions[sessions.length - 1];\n    const range = first === last\n      ? `${first.label} (${first.date})`\n      : `${first.label} (${first.date}) → ${last.label} (${last.date})`;\n    sub.textContent = `${range} · 1 lap = 0.2 miles`;\n  }\n})();\n\n/* ====================== ADMIN: PASSWORD GATE + EDITOR ====================== */\nconst ADMIN_PASSWORD = \"066\";\nconst adminAuthModal  = document.getElementById(\"adminAuthModal\");\nconst adminEditModal  = document.getElementById(\"adminEditModal\");\nconst adminAuthInput  = document.getElementById(\"adminAuthInput\");\nconst adminAuthError  = document.getElementById(\"adminAuthError\");\n\nfunction openAdminAuth() {\n  adminAuthError.textContent = \"\";\n  adminAuthInput.value = \"\";\n  adminAuthModal.hidden = false;\n  setTimeout(() => adminAuthInput.focus(), 30);\n}\nfunction closeAdminAuth() {\n  adminAuthModal.hidden = true;\n}\nfunction submitAdminAuth() {\n  const v = (adminAuthInput.value || \"\").trim();\n  if (v === ADMIN_PASSWORD) {\n    closeAdminAuth();\n    openAdminEditor();\n  } else {\n    adminAuthError.textContent = \"Incorrect password. Try again.\";\n    adminAuthInput.select();\n  }\n}\n\nfunction openAdminEditor() {\n  buildEditorTable();\n  adminEditModal.hidden = false;\n}\nfunction closeAdminEditor() {\n  adminEditModal.hidden = true;\n}\n\nfunction buildEditorTable() {\n  const table = document.getElementById(\"editorTable\");\n  const info  = document.getElementById(\"editorInfo\");\n\n  let thead = '<tr><th class=\"student-col\">Student<\u002Fth>';\n  sessions.forEach((s, i) => {\n    const lbl  = (s.label || \"\").replace(/\"/g, \"&quot;\");\n    const date = (s.date  || \"\").replace(/\"/g, \"&quot;\");\n    thead += `<th>\n      <input type=\"text\" class=\"ses-label\" data-idx=\"${i}\" value=\"${lbl}\" maxlength=\"6\" />\n      <input type=\"text\" class=\"ses-date\"  data-idx=\"${i}\" value=\"${date}\" placeholder=\"Date\" maxlength=\"10\" />\n    <\u002Fth>`;\n  });\n  thead += '<\u002Ftr>';\n  table.querySelector(\"thead\").innerHTML = thead;\n\n  let tbody = '';\n  students.forEach((stu, sIdx) => {\n    const safeName = stu.name.replace(/\"/g, \"&quot;\");\n    tbody += `<tr><td class=\"student-col\">\n      <div class=\"stu-name\">${safeName}<\u002Fdiv>\n      <div class=\"stu-level\">${stu.level} · ${stu._autoTier || stu.tier}<\u002Fdiv>\n    <\u002Ftd>`;\n    for (let i = 0; i < sessions.length; i++) {\n      const v = stu.laps[i];\n      const empty = (v === null || v === undefined) ? \" empty\" : \"\";\n      const val = (v === null || v === undefined) ? \"\" : v;\n      tbody += `<td><input type=\"number\" min=\"0\" step=\"1\" class=\"lap-cell${empty}\" data-student=\"${sIdx}\" data-session=\"${i}\" value=\"${val}\" /><\u002Ftd>`;\n    }\n    tbody += '<\u002Ftr>';\n  });\n  table.querySelector(\"tbody\").innerHTML = tbody;\n\n  info.textContent = `${students.length} students × ${sessions.length} sessions`;\n\n  // Update \"empty\" styling as user edits.\n  table.querySelectorAll(\".lap-cell\").forEach(cell => {\n    cell.addEventListener(\"input\", () => {\n      cell.classList.toggle(\"empty\", cell.value.trim() === \"\");\n    });\n  });\n}\n\nfunction addEditorSession() {\n  openAddSessionFlow();\n}\nfunction _appendBlankSession() {\n  const newIdx = sessions.length + 1;\n  sessions.push({ label: `S${newIdx}`, date: \"\" });\n  students.forEach(s => s.laps.push(null));\n  buildEditorTable();\n}\nfunction removeEditorSession() {\n  if (sessions.length <= 1) return;\n  sessions.pop();\n  students.forEach(s => s.laps.pop());\n  buildEditorTable();\n}\nfunction saveEditor() {\n  // Read session labels/dates from inputs.\n  const labelEls = document.querySelectorAll(\".ses-label\");\n  const dateEls  = document.querySelectorAll(\".ses-date\");\n  const newSessions = [];\n  labelEls.forEach((el, i) => {\n    const orig = sessions[i] || {};\n    newSessions.push({\n      ...orig,\n      label: el.value.trim() || `S${i + 1}`,\n      date:  (dateEls[i] && dateEls[i].value.trim()) || \"\",\n    });\n  });\n\n  // Read lap cells.\n  const newLaps = {};\n  students.forEach((stu, sIdx) => {\n    const arr = [];\n    for (let i = 0; i < newSessions.length; i++) {\n      const cell = document.querySelector(`.lap-cell[data-student=\"${sIdx}\"][data-session=\"${i}\"]`);\n      const raw = cell ? cell.value.trim() : \"\";\n      if (raw === \"\") arr.push(null);\n      else {\n        const n = parseInt(raw, 10);\n        arr.push(Number.isFinite(n) && n >= 0 ? n : null);\n      }\n    }\n    newLaps[stu.name] = arr;\n  });\n\n  try {\n    localStorage.setItem(SESSION_STORAGE_KEY, JSON.stringify({\n      sessions: newSessions,\n      laps: newLaps,\n      savedAt: new Date().toISOString(),\n    }));\n  } catch (e) {\n    alert(\"Could not save: \" + (e.message || e));\n    return;\n  }\n  location.reload();\n}\nfunction resetEditorData() {\n  if (!confirm(\"Reset all session data and lap counts to the defaults? This cannot be undone.\")) return;\n  localStorage.removeItem(SESSION_STORAGE_KEY);\n  location.reload();\n}\n\ndocument.getElementById(\"adminBtn\").addEventListener(\"click\", openAdminAuth);\ndocument.getElementById(\"adminAuthClose\").addEventListener(\"click\", closeAdminAuth);\ndocument.getElementById(\"adminAuthCancel\").addEventListener(\"click\", closeAdminAuth);\ndocument.getElementById(\"adminAuthBackdrop\").addEventListener(\"click\", closeAdminAuth);\ndocument.getElementById(\"adminAuthSubmit\").addEventListener(\"click\", submitAdminAuth);\nadminAuthInput.addEventListener(\"keydown\", (e) => {\n  if (e.key === \"Enter\") { e.preventDefault(); submitAdminAuth(); }\n});\n\ndocument.getElementById(\"adminEditClose\").addEventListener(\"click\", closeAdminEditor);\ndocument.getElementById(\"adminEditCancel\").addEventListener(\"click\", closeAdminEditor);\ndocument.getElementById(\"adminEditBackdrop\").addEventListener(\"click\", closeAdminEditor);\ndocument.getElementById(\"adminEditSave\").addEventListener(\"click\", saveEditor);\ndocument.getElementById(\"addSessionBtn\").addEventListener(\"click\", addEditorSession);\ndocument.getElementById(\"removeSessionBtn\").addEventListener(\"click\", removeEditorSession);\ndocument.getElementById(\"resetDataBtn\").addEventListener(\"click\", resetEditorData);\n\ndocument.addEventListener(\"keydown\", (e) => {\n  if (!adminAuthModal.hidden && e.key === \"Escape\") closeAdminAuth();\n  if (!adminEditModal.hidden && e.key === \"Escape\") closeAdminEditor();\n});\n\n/* ====================== ADMIN: SESSION IMPORT FROM TEXT ====================== */\nconst addSessionModal = document.getElementById(\"addSessionModal\");\nconst importTextEl    = document.getElementById(\"importText\");\nconst importLabelEl   = document.getElementById(\"importLabel\");\nconst importDateEl    = document.getElementById(\"importDate\");\n\nfunction _todayShort() {\n  const d = new Date();\n  return d.toLocaleDateString(\"en-US\", { month: \"short\", day: \"numeric\" });\n}\n\nfunction openAddSessionFlow() {\n  importLabelEl.value = `S${sessions.length + 1}`;\n  importDateEl.value  = _todayShort();\n  importTextEl.value  = \"\";\n  // Clear stashed manual overrides\n  _ipManualValues = {};\n  refreshImportPreview();\n  addSessionModal.hidden = false;\n  setTimeout(() => importTextEl.focus(), 30);\n}\nfunction closeAddSessionFlow() {\n  addSessionModal.hidden = true;\n}\n\n// Parser: walks tokens, pairs \"name number\".\nfunction parseSessionInput(text, roster) {\n  const rosterLC = {};\n  roster.forEach(name => { rosterLC[name.toLowerCase()] = name; });\n  // Split on whitespace + common separators.\n  const tokens = text.split(/[\\s,;:\\-=|()\\/\\\\\\[\\]<>]+/).filter(t => t.length > 0);\n  const matched = {};\n  const unrecognized = [];\n  const orphanNumbers = [];\n  let pendingName = null;\n  for (const t of tokens) {\n    const cleaned = t.toLowerCase().replace(/[^a-z0-9.]/g, \"\");\n    if (!cleaned) continue;\n    if (/^\\d+(\\.\\d+)?$/.test(cleaned)) {\n      const num = Math.round(parseFloat(cleaned));\n      if (pendingName) {\n        matched[pendingName] = num;\n        pendingName = null;\n      } else {\n        orphanNumbers.push(t);\n      }\n    } else if (/^[a-z]/.test(cleaned)) {\n      // Drop any stale pending name without a number (we'll show that name under \"missing\").\n      pendingName = rosterLC[cleaned] || null;\n      if (!pendingName) unrecognized.push(t);\n    } else {\n      unrecognized.push(t);\n    }\n  }\n  const missing = roster.filter(n => !(n in matched));\n  return { matched, unrecognized: [...unrecognized, ...orphanNumbers], missing };\n}\n\n// Manual edits to ip-val inputs are stashed here so they survive re-parses\n// when the user types in the paste area.\nlet _ipManualValues = {};\n\nfunction _captureIpManualEdits() {\n  document.querySelectorAll(\".ip-val\").forEach(el => {\n    const n = el.dataset.name;\n    const v = el.value.trim();\n    if (v === \"\") {\n      // Mark as explicitly cleared, but don't add new keys for empty unchanged cells\n      if (n in _ipManualValues) _ipManualValues[n] = \"\";\n    } else {\n      _ipManualValues[n] = v;\n    }\n  });\n}\n\nfunction refreshImportPreview() {\n  _captureIpManualEdits();\n\n  const text = importTextEl.value;\n  const roster = students.map(s => s.name);\n  const levelByName = {};\n  students.forEach(s => { levelByName[s.name] = s.level; });\n  const { matched, unrecognized, missing } = parseSessionInput(text, roster);\n\n  // Effective value per student (parsed + any manual override)\n  function effectiveVal(name, parsed) {\n    if (name in _ipManualValues) {\n      const v = _ipManualValues[name];\n      return v === \"\" ? \"\" : v;\n    }\n    return parsed !== undefined ? String(parsed) : \"\";\n  }\n\n  // Names with any effective value (parsed OR manual)\n  const filledFromManual = Object.keys(_ipManualValues).filter(n =>\n    _ipManualValues[n] !== \"\" && !(n in matched)\n  );\n  const matchedNames = roster.filter(n => (n in matched) || filledFromManual.includes(n));\n  const missingNames = roster.filter(n => !matchedNames.includes(n));\n\n  // Matched column\n  const matchedList = document.getElementById(\"ipMatched\");\n  document.getElementById(\"ipMatchedCount\").textContent = String(matchedNames.length);\n  matchedList.innerHTML = matchedNames.length\n    ? matchedNames.map(n => {\n        const val = effectiveVal(n, matched[n]);\n        const lvl = levelByName[n] || \"\";\n        return `<div class=\"ip-row matched-row\">\n          <span class=\"ip-name\">${_esc(n)}<span class=\"ip-level\">${_esc(lvl)}<\u002Fspan><\u002Fspan>\n          <input type=\"number\" class=\"ip-val\" min=\"0\" data-name=\"${_esc(n)}\" value=\"${_esc(val)}\" />\n        <\u002Fdiv>`;\n      }).join(\"\")\n    : `<div class=\"ip-row empty-row\">No matches yet — paste lap counts above.<\u002Fdiv>`;\n\n  // Missing column (editable so coach can fill in)\n  const missingList = document.getElementById(\"ipMissing\");\n  document.getElementById(\"ipMissingCount\").textContent = String(missingNames.length);\n  missingList.innerHTML = missingNames.length\n    ? missingNames.map(n => {\n        const val = effectiveVal(n, undefined);\n        const lvl = levelByName[n] || \"\";\n        return `<div class=\"ip-row missing-row\">\n          <span class=\"ip-name\">${_esc(n)}<span class=\"ip-level\">${_esc(lvl)}<\u002Fspan><\u002Fspan>\n          <input type=\"number\" class=\"ip-val\" min=\"0\" data-name=\"${_esc(n)}\" value=\"${_esc(val)}\" placeholder=\"—\" />\n        <\u002Fdiv>`;\n      }).join(\"\")\n    : `<div class=\"ip-row empty-row\">All students accounted for ✓<\u002Fdiv>`;\n\n  // Unread column\n  const unreadList = document.getElementById(\"ipUnread\");\n  document.getElementById(\"ipUnreadCount\").textContent = String(unrecognized.length);\n  unreadList.innerHTML = unrecognized.length\n    ? unrecognized.map(t => `<div class=\"ip-row unread-row\">${_esc(t)}<\u002Fdiv>`).join(\"\")\n    : `<div class=\"ip-row empty-row\">Nothing unread ✓<\u002Fdiv>`;\n\n  document.getElementById(\"ipSummary\").textContent =\n    `${matchedNames.length} matched · ${missingNames.length} missing · ${unrecognized.length} unread`;\n\n  // Re-stash manual edits when user changes an input.\n  document.querySelectorAll(\".ip-val\").forEach(el => {\n    el.addEventListener(\"input\", () => {\n      _ipManualValues[el.dataset.name] = el.value.trim();\n      document.getElementById(\"ipSummary\").textContent =\n        `${document.getElementById(\"ipMatchedCount\").textContent} matched · ` +\n        `${document.getElementById(\"ipMissingCount\").textContent} missing · ` +\n        `${document.getElementById(\"ipUnreadCount\").textContent} unread`;\n    });\n    // Move a missing row into matched when its value becomes non-empty.\n    el.addEventListener(\"change\", () => refreshImportPreview());\n  });\n}\n\nfunction _esc(s) {\n  return String(s).replace(/&/g, \"&amp;\").replace(/<\u002Fg, \"&lt;\").replace(/>/g, \"&gt;\").replace(/\"/g, \"&quot;\");\n}\n\nfunction confirmAddSession() {\n  _captureIpManualEdits();\n  const label = (importLabelEl.value || \"\").trim() || `S${sessions.length + 1}`;\n  const date  = (importDateEl.value  || \"\").trim();\n\n  // Pull values directly off the inputs now (most current state).\n  const values = {};\n  document.querySelectorAll(\".ip-val\").forEach(el => {\n    const n = el.dataset.name;\n    const v = el.value.trim();\n    if (v === \"\") values[n] = null;\n    else {\n      const num = parseInt(v, 10);\n      values[n] = (Number.isFinite(num) && num >= 0) ? num : null;\n    }\n  });\n\n  sessions.push({ label, date });\n  students.forEach(stu => {\n    stu.laps.push(stu.name in values ? values[stu.name] : null);\n  });\n\n  closeAddSessionFlow();\n  buildEditorTable();\n}\n\ndocument.getElementById(\"addSessionClose\").addEventListener(\"click\", closeAddSessionFlow);\ndocument.getElementById(\"addSessionCancel\").addEventListener(\"click\", closeAddSessionFlow);\ndocument.getElementById(\"addSessionBackdrop\").addEventListener(\"click\", closeAddSessionFlow);\ndocument.getElementById(\"addSessionConfirm\").addEventListener(\"click\", confirmAddSession);\nimportTextEl.addEventListener(\"input\", refreshImportPreview);\ndocument.addEventListener(\"keydown\", (e) => {\n  if (!addSessionModal.hidden && e.key === \"Escape\") closeAddSessionFlow();\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>

<script>
(function() {
  var DISCLAIMER_ID = '__legend_disclaimer';

  function makeDisclaimer() {
    var box = document.createElement('div');
    box.id = DISCLAIMER_ID;
    box.style.cssText = 'margin-top:10px;padding:10px 13px;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;font-size:11.5px;line-height:1.65;color:#374151;';
    box.innerHTML =
      '<p style="margin-bottom:5px"><span style="font-weight:700;color:#16A34A;">&#9679; Race Ready</span> &mdash; Running performance data is strong. This student has demonstrated the fitness and consistency to complete the 5K. Note: this status does not guarantee outcome &mdash; race-day strategy, fueling, mental focus, and grit are separate factors that will ultimately shape how they perform on the day.</p>' +
      '<p style="margin-bottom:5px"><span style="font-weight:700;color:#D97706;">&#9679; Building</span> &mdash; This student is trending in the right direction but hasn\'t yet hit the benchmarks to be considered race-ready. With consistent effort and continued sessions, they are on track. Focus areas: pacing discipline, lap-to-lap consistency, and completing full distances without stopping (stamina).</p>' +
      '<p><span style="font-weight:700;color:#DC2626;">&#9679; Needs Support</span> &mdash; This student\'s current performance data shows they are still working toward race benchmarks. They are continuing to put in the effort each session and there is still room to grow before race day.</p>';
    return box;
  }

  function findLegendContainer() {
    // Find a leaf element containing "Race Ready" text
    var all = document.querySelectorAll('*');
    for (var i = 0; i < all.length; i++) {
      var el = all[i];
      var text = el.innerText || el.textContent || '';
      if (text.trim() === 'Race Ready') {
        // Walk up to find the row, then the legend wrapper
        var row = el.parentElement;
        var legendWrapper = row && row.parentElement;
        return legendWrapper || null;
      }
    }
    return null;
  }

  function inject() {
    if (document.getElementById(DISCLAIMER_ID)) return true;
    var legend = findLegendContainer();
    if (!legend) return false;
    legend.parentNode.insertBefore(makeDisclaimer(), legend.nextSibling);
    return true;
  }

  var attempts = 0;
  var timer = setInterval(function() {
    attempts++;
    if (inject() || attempts > 40) clearInterval(timer);
  }, 250);
})();
</script>
</body>
